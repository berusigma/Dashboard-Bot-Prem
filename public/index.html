<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PremiumKita - Cyber Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { 
    --bg: #f0f4f8; 
    --card: #ffffff; 
    --border: #e2e8f0; 
    --text: #0f172a; 
    --muted: #64748b; 
    --brand: #0ea5e9; /* Cyber Blue */
    --brand-glow: rgba(14, 165, 233, 0.4);
    --green: #10b981; 
    --yellow: #f59e0b; 
    --red: #ef4444; 
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  /* Cyber Effects */
  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(14, 165, 233, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.03) 1px, transparent 1px);
    background-size: 30px 30px; pointer-events: none; z-index: -1;
  }

  .header { background: var(--card); border-bottom: 2px solid var(--brand); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px var(--brand-glow); position: relative; z-index: 10; }
  .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}
  .logo span { color: var(--brand); text-shadow: 0 0 10px var(--brand-glow); }
  
  .auth-overlay { position: fixed; inset: 0; background: rgba(240, 244, 248, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 100; transition: 0.3s; }
  .auth-card { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--brand); box-shadow: 0 10px 30px var(--brand-glow); width: 100%; max-width: 400px; text-align: center; position: relative; overflow: hidden; }
  .auth-card::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 2px; background: var(--brand); animation: scanline 2s infinite linear; }
  @keyframes scanline { 100% { left: 200%; } }
  
  .auth-card input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; transition: 0.3s; }
  .auth-card input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 10px var(--brand-glow); }
  
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-primary { background: var(--brand); color: #fff; width: 100%; box-shadow: 0 4px 15px var(--brand-glow); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--brand-glow); filter: brightness(1.1); }
  
  .container { padding: 24px; max-width: 1400px; margin: 0 auto; display: none; }
  .container.active { display: block; animation: fadeIn 0.5s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .nav { display: flex; gap: 8px; padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .nav-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: var(--muted); transition: 0.2s; display: flex; align-items: center; gap: 6px;}
  .nav-btn.active, .nav-btn:hover { background: var(--bg); color: var(--brand); box-shadow: inset 0 0 0 1px var(--brand); }
  
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; position: relative; overflow: hidden; transition: 0.3s; }
  .stat-card:hover { border-color: var(--brand); box-shadow: 0 10px 20px var(--brand-glow); transform: translateY(-5px); }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'Orbitron', sans-serif; }
  .stat-val { font-size: 32px; font-weight: 700; color: var(--text); }
  .stat-val.blue { color: var(--brand); }
  
  /* Sisanya styling standar yang diperbarui warnanya */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; font-weight: 600; }
  .alert.show { display: block; animation: fadeIn 0.3s; }
  .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
  
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="auth-overlay" id="authLayer">
  <div class="auth-card" id="loginBox">
    <h2 style="font-family: 'Orbitron'; margin-bottom: 8px; color: var(--brand);">SYSTEM LOGIN</h2>
    <p style="font-size: 13px; color: var(--muted); margin-bottom: 24px;">Autentikasi Diperlukan</p>
    <div id="authAlert" class="alert"></div>
    <input type="email" id="emailInput" placeholder="Admin Email" />
    <input type="password" id="passInput" placeholder="Password" />
    <button class="btn btn-primary" onclick="requestOtp()">Minta Kode OTP</button>
  </div>

  <div class="auth-card hidden" id="otpBox">
    <h2 style="font-family: 'Orbitron'; margin-bottom: 8px; color: var(--brand);">VERIFIKASI OTP</h2>
    <p style="font-size: 13px; color: var(--muted); margin-bottom: 24px;">Cek email lu masbro.</p>
    <div id="otpAlert" class="alert"></div>
    <input type="text" id="otpInput" placeholder="Masukkan 6 Digit OTP" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 4px; font-family: monospace;" />
    <button class="btn btn-primary" onclick="verifyOtp()">Verifikasi & Masuk</button>
  </div>
</div>

<div class="header">
  <div class="logo">Premium<span>Kita</span></div>
  <button class="btn" style="background: var(--bg); color: var(--text); border: 1px solid var(--border);" onclick="logout()">🛑 Logout</button>
</div>

<div class="nav">
  <button class="nav-btn active">📊 Statistik Dashboard</button>
</div>

<div class="container" id="dashboardContent">
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total Pengguna</div><div class="stat-val blue" id="s-users">0</div></div>
    <div class="stat-card"><div class="stat-label">Keamanan Sesi</div><div class="stat-val" style="color: var(--green); font-size: 24px;">AKTIF</div></div>
  </div>
  </div>

<script>
let currentEmail = '';

function showAlert(id, msg, type='success') {
  const el = document.getElementById(id);
  el.className = `alert alert-${type} show`;
  el.textContent = msg;
  setTimeout(() => el.classList.remove('show'), 4000);
}

async function requestOtp() {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passInput').value;
  
  const res = await fetch('/api/auth/request-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  
  if (data.ok) {
    currentEmail = email;
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('otpBox').classList.remove('hidden');
    showAlert('otpAlert', 'OTP dikirim ke email!', 'success');
  } else {
    showAlert('authAlert', data.message, 'error');
  }
}

async function verifyOtp() {
  const otp = document.getElementById('otpInput').value;
  
  const res = await fetch('/api/auth/verify-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: currentEmail, otp })
  });
  const data = await res.json();
  
  if (data.ok) {
    document.getElementById('authLayer').classList.add('hidden');
    document.getElementById('dashboardContent').classList.add('active');
    loadStats(); // Fungsi ini butuh route backend yang diproteksi auth
  } else {
    showAlert('otpAlert', data.message, 'error');
  }
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  location.reload(); // Refresh halaman agar kembali ke menu login
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const data = await res.json();
  if (data.ok) {
    document.getElementById('s-users').textContent = data.data.totalUsers;
  } else {
    // Kalo token habis/gak ada cookie, tendang ke login
    location.reload();
  }
}

// Cek otomatis saat awal muat, kalau udah ada cookie yang valid, langsung buka dashboard
window.onload = async () => {
  const res = await fetch('/api/stats');
  if (res.ok) {
    document.getElementById('authLayer').classList.add('hidden');
    document.getElementById('dashboardContent').classList.add('active');
    loadStats();
  }
};
</script>
</body>
</html>
